# 서버 풀: 동일 에이전트 이미지를 N개 띄워 N대의 서버를 흉내낸다.
# 기본 5대(agent-1..5). 각 인스턴스는 고정 포트로 publish 되어
# 백엔드가 host.docker.internal:9101..9105 으로 수집한다.
services:
  agent-1:
    build: .
    environment:
      SERVER_ID: 1
      PORT: 9101
    ports:
      - "9101:9101"

  agent-2:
    build: .
    environment:
      SERVER_ID: 2
      PORT: 9102
    ports:
      - "9102:9102"

  agent-3:
    build: .
    environment:
      SERVER_ID: 3
      PORT: 9103
    ports:
      - "9103:9103"

  agent-4:
    build: .
    environment:
      SERVER_ID: 4
      PORT: 9104
    ports:
      - "9104:9104"

  agent-5:
    build: .
    environment:
      SERVER_ID: 5
      PORT: 9105
    ports:
      - "9105:9105"
