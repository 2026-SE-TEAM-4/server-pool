# 서버 풀: 동일 에이전트 이미지를 N개 띄워 N대의 서버를 흉내낸다.
# 6대(agent-1..6). 각 인스턴스는 고정 포트로 publish 되어
# 백엔드가 host.docker.internal:9101..9106 으로 수집한다.
# NET_CAP_MBPS는 서버별 실제 NIC 대역폭(Mbps)에 맞춰 설정한다.
services:
  agent-1:
    build: .
    environment:
      SERVER_ID: 1
      PORT: 9101
      NET_CAP_MBPS: 25000   # 25Gbps — HPC GPU 플래그십
    ports:
      - "9101:9101"

  agent-2:
    build: .
    environment:
      SERVER_ID: 2
      PORT: 9102
      NET_CAP_MBPS: 10000   # 10Gbps — 딥러닝 워크스테이션
    ports:
      - "9102:9102"

  agent-3:
    build: .
    environment:
      SERVER_ID: 3
      PORT: 9103
      NET_CAP_MBPS: 10000   # 10Gbps — 딥러닝 워크스테이션
    ports:
      - "9103:9103"

  agent-4:
    build: .
    environment:
      SERVER_ID: 4
      PORT: 9104
      NET_CAP_MBPS: 10000   # 10Gbps — 추론 서버
    ports:
      - "9104:9104"

  agent-5:
    build: .
    environment:
      SERVER_ID: 5
      PORT: 9105
      NET_CAP_MBPS: 100000  # 100Gbps — CPU HPC 클러스터
    ports:
      - "9105:9105"

  agent-6:
    build: .
    environment:
      SERVER_ID: 6
      PORT: 9106
      NET_CAP_MBPS: 25000   # 25Gbps — CPU 대용량 연산
    ports:
      - "9106:9106"
